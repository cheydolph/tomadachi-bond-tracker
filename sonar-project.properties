# sonar-project.properties
# SonarQube / SonarCloud analysis config for Tomadachi Bond Tracker.

# ── Identity ──────────────────────────────────────────────────────────────────
sonar.projectKey=tomadachi-bond-tracker
sonar.projectName=Tomadachi Bond Tracker
sonar.projectVersion=2.0.0

# ── Source root ───────────────────────────────────────────────────────────────
sonar.sources=app,components,lib
sonar.tests=                          # update to e.g. __tests__ when tests are added
sonar.sourceEncoding=UTF-8

# ── Language ──────────────────────────────────────────────────────────────────
# SonarQube auto-detects TypeScript/TSX; this makes it explicit.
sonar.typescript.tsconfigPath=tsconfig.json

# ── Exclusions ────────────────────────────────────────────────────────────────
# Exclude generated, vendored, and build-output files from analysis.
# These would inflate duplication metrics and produce irrelevant issues.
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  out/**,\
  public/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  next-env.d.ts,\
  app/robots.ts

# Coverage reports (uncomment and point to actual output when tests exist)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.testExecutionReportPaths=coverage/test-reporter.xml

# ── Quality gate settings ────────────────────────────────────────────────────
# These map to SonarQube's "Sonar Way" quality gate by default.
# Override here only if you need project-specific thresholds.

# Block new code with a reliability rating below A (= no new bugs).
# sonar.qualitygate.wait=true  # set in CI to fail the pipeline on gate failure

# ── Duplication ───────────────────────────────────────────────────────────────
# Default threshold is 3% duplicated lines. The bond config entries in
# types.ts are intentionally repeated (one per level) and not true duplication.
# Raise the threshold slightly to avoid false positives there.
sonar.cpd.exclusions=lib/types.ts

# ── Issue severities ──────────────────────────────────────────────────────────
# Sonar rules of interest for this stack (for reference — configure in the
# SonarQube UI under Quality Profiles, not here):
#
# typescript:S1128  — Remove unused imports                       [MAJOR]
# typescript:S3776  — Cognitive complexity > 15                   [CRITICAL]
# typescript:S6747  — useEffect missing dependency                [MAJOR]
# typescript:S6756  — React keys in lists                         [MAJOR]
# typescript:S4325  — Type assertion to same type                 [MINOR]
# Web:S5148         — <a target="_blank"> without rel=noopener    [MAJOR]
# css:S4670          — Unknown CSS properties (useful for globals) [MINOR]
